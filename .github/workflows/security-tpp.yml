name: Security Baseline (TPP — reusable)

on:
  workflow_call:
    secrets:
      MAIN_TELEGRAM_TOKEN:
        required: true
      COPILOT_ADRIAN_CHAT_ID:
        required: true

permissions:
  contents: read
  actions: read

jobs:
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

  osv-scanner:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Install OSV-Scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
      - name: Run OSV-Scanner
        run: ./osv-scanner --recursive --skip-git ./
        continue-on-error: true

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: never

  notify-failure:
    name: Telegram alert
    runs-on: ubuntu-latest
    needs: [trivy, osv-scanner, gitleaks, codeql]
    if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
    steps:
      - name: Send Telegram alert
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.MAIN_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.COPILOT_ADRIAN_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🚨 *Security scan failed*%0A%0ARepo: \`${{ github.repository }}\`%0ATrigger: \`${{ github.event_name }}\`%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
